<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ML Practicals Dashboard</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      display: flex;
      flex-direction: column; 
      justify-content: flex-start;
      align-items: center;
      height: 100vh; 
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 40px;
      color: #333;
    }

    .container1 {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%; 
      margin-bottom: 30px; 
    }

    .practical-image {
      width: 40vw; 
      height: auto; 
      border-radius: 50%; 
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      max-width: 1200px;
      padding: 20px;
      justify-content: center;
      align-items: center;
    }

    .btn {
      background-color: #2d87f0;
      color: white;
      padding: 15px 25px;
      text-align: center;
      font-size: 16px;
      border-radius: 8px;
      width: 200px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin: 10px 0;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #1a6cdb;
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      background-color: #145aa6;
    }

    /* Styling for placeholder buttons */
    .btn.disabled {
      background-color: #a0c4f2;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-wrapper {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      text-align: center;
      min-width: 250px;
      max-width: 300px;
    }

    .btn-wrapper h3 {
      font-size: 20px;
      margin-bottom: 15px;
      color: #333;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
      }

      .practical-image {
        width: 60vw;  
      }
    }
  </style>
</head>
<body>
  <div>
    <h1>Machine Learning Practicals</h1>
    <div id="tlkio" data-channel="enter_to_chat_with_others" style="width:100%;height:400px;"></div>
    <script async src="https://tlk.io/embed.js" type="text/javascript"></script>
    
    <!-- Code Download Links -->
    <div class="container" id="container"></div>
  </div>

  <script>
    // Updated array with the specific ML scripts we worked on
    const files = [
      { name: '1. ANN (Classification & Regression)', link: 'ANN.txt', active: true },
      { name: '2. Principal Component Analysis', link: 'PCA.txt', active: true },
      { name: '3. LDA & QDA', link: 'LDA QDA.txt', active: true },
      { name: '4. K-Means Clustering', link: 'K meams.txt', active: true },
      
      // Placeholders for the upcoming practicals you mentioned
      { name: '5. Upcoming Practical', link: '#', active: false },
      { name: '6. Upcoming Practical', link: '#', active: false }
    ];

    const container = document.getElementById('container');

    files.forEach(file => {
      const wrapper = document.createElement('div');
      wrapper.className = 'btn-wrapper';
      
      // If the file is active, create a working download link. Otherwise, make it a disabled placeholder.
      if (file.active) {
        wrapper.innerHTML = `
          <h3>${file.name}</h3>
          <a class="btn" href="${file.link}" download target="_blank">Download Code</a>
        `;
      } else {
        wrapper.innerHTML = `
          <h3>${file.name}</h3>
          <a class="btn disabled" href="#" onclick="return false;">Pending</a>
        `;
      }
      
      container.appendChild(wrapper);
    });
  </script>
</body>
</html>
